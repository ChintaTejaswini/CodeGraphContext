name: Route Issues

on:
  issues:
    types: [labeled]
  pull_request:
    types: [labeled]

jobs:
  route:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
      repository-projects: write

    steps:
      - name: Route issue based on labels
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.ROUTE_ISSUES_PAT || github.token }}
          script: |
            const labelName = context.payload.label.name;
            const label = labelName.toLowerCase();
            const contentId = context.payload.issue?.node_id || context.payload.pull_request?.node_id;

            console.log(`Processing label: "${labelName}"`);

            // Resilient helper to fetch Project V2 metadata by number
            async function getProjectMetadata(org, number) {
              try {
                const query = `
                  query($org: String!, $number: Int!) {
                    organization(login: $org) {
                      projectV2(number: $number) {
                        id
                        title
                        fields(first: 50) {
                          nodes {
                            ... on ProjectV2FieldCommon {
                              id
                              name
                              dataType
                            }
                            ... on ProjectV2SingleSelectField {
                              id
                              name
                              options {
                                id
                                name
                              }
                            }
                          }
                        }
                      }
                    }
                  }
                `;
                const result = await github.graphql(query, { org, number });
                return result.organization?.projectV2;
              } catch (e) {
                console.log(`Failed to fetch project as organization, trying as user: ${e.message}`);
                try {
                  const query = `
                    query($user: String!, $number: Int!) {
                      user(login: $user) {
                        projectV2(number: $number) {
                          id
                          title
                          fields(first: 50) {
                            nodes {
                              ... on ProjectV2FieldCommon {
                                id
                                name
                                dataType
                              }
                              ... on ProjectV2SingleSelectField {
                                id
                                name
                                options {
                                  id
                                  name
                                }
                              }
                            }
                          }
                        }
                      }
                    }
                  `;
                  const result = await github.graphql(query, { user: org, number });
                  return result.user?.projectV2;
                } catch (userError) {
                  console.error(`Failed to fetch project as user: ${userError.message}`);
                  return null;
                }
              }
            }

            // Consolidated helper function to update project status, adding the issue/PR to the project if not present
            async function updateProjectStatus(targetStatusName) {
              const projectNumber = 3; // The project number from settings
              const org = context.repo.owner;

              console.log(`Attempting to update project #${projectNumber} Status field to "${targetStatusName}"...`);
              try {
                // 1. Fetch project metadata
                const project = await getProjectMetadata(org, projectNumber);
                if (!project) {
                  console.warn(`Could not find project #${projectNumber} under "${org}".`);
                  return false;
                }
                console.log(`Successfully fetched project details for "${project.title}" (ID: ${project.id})`);

                // 2. Find the Status field and the target option
                const statusField = project.fields.nodes.find(
                  f => f.name.toLowerCase() === 'status' && f.options
                );
                if (!statusField) {
                  console.warn(`No single-select field named "Status" found in project #${projectNumber}.`);
                  return false;
                }
                const targetOption = statusField.options.find(
                  opt => opt.name.toLowerCase() === targetStatusName.toLowerCase()
                );
                if (!targetOption) {
                  console.warn(`No option named "${targetStatusName}" found in the Status field of project #${projectNumber}.`);
                  return false;
                }
                console.log(`Found Status option: "${targetOption.name}" (ID: ${targetOption.id})`);

                // 3. Find if the issue/PR is already an item in project #3
                const checkQuery = `
                  query($nodeId: ID!) {
                    node(id: $nodeId) {
                      ... on Issue {
                        projectItems(first: 10) {
                          nodes {
                            id
                            project {
                              id
                              number
                            }
                          }
                        }
                      }
                      ... on PullRequest {
                        projectItems(first: 10) {
                          nodes {
                            id
                            project {
                              id
                              number
                            }
                          }
                        }
                      }
                    }
                  }
                `;
                const checkResult = await github.graphql(checkQuery, { nodeId: contentId });
                const existingItems = checkResult.node?.projectItems?.nodes || [];
                const matchedItem = existingItems.find(item => item.project.number === projectNumber);

                let itemId = null;
                if (matchedItem) {
                  itemId = matchedItem.id;
                  console.log(`Item already in project #${projectNumber}. Item ID: ${itemId}`);
                } else {
                  console.log(`Item not in project #${projectNumber}. Adding to project...`);
                  const addMutation = `
                    mutation($projectId: ID!, $contentId: ID!) {
                      addProjectV2ItemById(input: { projectId: $projectId, contentId: $contentId }) {
                        item {
                          id
                        }
                      }
                    }
                  `;
                  const addResult = await github.graphql(addMutation, { projectId: project.id, contentId });
                  itemId = addResult.addProjectV2ItemById?.item?.id;
                  if (!itemId) {
                    console.error('Failed to add item to project board.');
                    return false;
                  }
                  console.log(`Successfully added item to project. New Item ID: ${itemId}`);
                }

                // 4. Update the Status field value
                const updateMutation = `
                  mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
                    updateProjectV2ItemFieldValue(
                      input: {
                        projectId: $projectId
                        itemId: $itemId
                        fieldId: $fieldId
                        value: {
                          singleSelectOptionId: $optionId
                        }
                      }
                    ) {
                      projectV2Item {
                        id
                      }
                    }
                  }
                `;
                await github.graphql(updateMutation, {
                  projectId: project.id,
                  itemId,
                  fieldId: statusField.id,
                  optionId: targetOption.id
                });
                console.log(`Successfully updated project Status to "${targetOption.name}".`);
                return true;

              } catch (error) {
                console.error(`Error in updateProjectStatus: ${error.message}`);
                return false;
              }
            }

            // Map the lowercase label to the exact Status column name
            let projectStatusName = null;

            if (label === 'adminarchs') {
              projectStatusName = 'AdminArchs';
            } else if (label === 'devops') {
              projectStatusName = 'DevOps';
            } else if (label === 'pythondevs') {
              projectStatusName = 'PythonDevs';
            } else if (label === 'aidevs') {
              projectStatusName = 'AIDevs';
            } else if (label === 'webdevs') {
              projectStatusName = 'WebDevs';
            } else if (label === 'extensiondevs') {
              projectStatusName = 'ExtensionDevs';
            } else if (label === 'docsexperts') {
              projectStatusName = 'DocsExperts';
            } else if (label === 'testers') {
              projectStatusName = 'Testers';
            } else if (label === 'blocked') {
              projectStatusName = 'Blocked';
            }

            if (projectStatusName) {
              await updateProjectStatus(projectStatusName);
            }
