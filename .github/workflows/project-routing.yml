name: Route Issues

on:
  issues:
    types: [labeled]

# Note on permissions:
# - Default GITHUB_TOKEN may not have organization permissions to read team members or request reviews.
# - If you get "Not Found" or "Forbidden" errors when querying org teams, you can pass a custom 
#   Personal Access Token (PAT) with "read:org" permissions, or configure a GitHub App token.
# - To use a PAT, change github-token input below to: github-token: ${{ secrets.YOUR_PAT_SECRET }}

jobs:
  route:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
      repository-projects: write

    steps:
      - name: Route issue based on labels
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.ROUTE_ISSUES_PAT || github.token }}
          script: |
            const labelName = context.payload.label.name;
            const label = labelName.toLowerCase();
            const isPullRequest = !!context.payload.issue?.pull_request || !!context.payload.pull_request;
            const contentId = context.payload.issue?.node_id || context.payload.pull_request?.node_id;

            console.log(`Processing label: "${labelName}"`);
            console.log(`Associated with PR? ${isPullRequest}`);

            // Resilient helper to fetch Project V2 metadata by number
            async function getProjectMetadata(org, number) {
              try {
                const query = `
                  query($org: String!, $number: Int!) {
                    organization(login: $org) {
                      projectV2(number: $number) {
                        id
                        title
                        fields(first: 50) {
                          nodes {
                            ... on ProjectV2FieldCommon {
                              id
                              name
                              dataType
                            }
                            ... on ProjectV2SingleSelectField {
                              id
                              name
                              options {
                                id
                                name
                              }
                            }
                          }
                        }
                      }
                    }
                  }
                `;
                const result = await github.graphql(query, { org, number });
                return result.organization?.projectV2;
              } catch (e) {
                console.log(`Failed to fetch project as organization, trying as user: ${e.message}`);
                try {
                  const query = `
                    query($user: String!, $number: Int!) {
                      user(login: $user) {
                        projectV2(number: $number) {
                          id
                          title
                          fields(first: 50) {
                            nodes {
                              ... on ProjectV2FieldCommon {
                                id
                                name
                                dataType
                              }
                              ... on ProjectV2SingleSelectField {
                                id
                                name
                                options {
                                  id
                                  name
                                }
                              }
                            }
                          }
                        }
                      }
                    }
                  `;
                  const result = await github.graphql(query, { user: org, number });
                  return result.user?.projectV2;
                } catch (userError) {
                  console.error(`Failed to fetch project as user: ${userError.message}`);
                  return null;
                }
              }
            }

            // Consolidated helper function to update project status, adding the issue/PR to the project if not present
            async function updateProjectStatus(targetStatusName) {
              const projectNumber = 3; // The project number from settings
              const org = context.repo.owner;

              console.log(`Attempting to update project #${projectNumber} Status field to "${targetStatusName}"...`);
              try {
                // 1. Fetch project metadata
                const project = await getProjectMetadata(org, projectNumber);
                if (!project) {
                  console.warn(`Could not find project #${projectNumber} under "${org}".`);
                  return false;
                }
                console.log(`Successfully fetched project details for "${project.title}" (ID: ${project.id})`);

                // 2. Find the Status field and the target option
                const statusField = project.fields.nodes.find(
                  f => f.name.toLowerCase() === 'status' && f.options
                );
                if (!statusField) {
                  console.warn(`No single-select field named "Status" found in project #${projectNumber}.`);
                  return false;
                }
                const targetOption = statusField.options.find(
                  opt => opt.name.toLowerCase() === targetStatusName.toLowerCase()
                );
                if (!targetOption) {
                  console.warn(`No option named "${targetStatusName}" found in the Status field of project #${projectNumber}.`);
                  return false;
                }
                console.log(`Found Status option: "${targetOption.name}" (ID: ${targetOption.id})`);

                // 3. Find if the issue is already an item in project #3
                const checkQuery = `
                  query($nodeId: ID!) {
                    node(id: $nodeId) {
                      ... on Issue {
                        projectItems(first: 10) {
                          nodes {
                            id
                            project {
                              id
                              number
                            }
                          }
                        }
                      }
                      ... on PullRequest {
                        projectItems(first: 10) {
                          nodes {
                            id
                            project {
                              id
                              number
                            }
                          }
                        }
                      }
                    }
                  }
                `;
                const checkResult = await github.graphql(checkQuery, { nodeId: contentId });
                const existingItems = checkResult.node?.projectItems?.nodes || [];
                const matchedItem = existingItems.find(item => item.project.number === projectNumber);

                let itemId = null;
                if (matchedItem) {
                  itemId = matchedItem.id;
                  console.log(`Issue already in project #${projectNumber}. Item ID: ${itemId}`);
                } else {
                  console.log(`Issue not in project #${projectNumber}. Adding issue to project...`);
                  const addMutation = `
                    mutation($projectId: ID!, $contentId: ID!) {
                      addProjectV2ItemById(input: { projectId: $projectId, contentId: $contentId }) {
                        item {
                          id
                        }
                      }
                    }
                  `;
                  const addResult = await github.graphql(addMutation, { projectId: project.id, contentId });
                  itemId = addResult.addProjectV2ItemById?.item?.id;
                  if (!itemId) {
                    console.error('Failed to add issue to project board.');
                    return false;
                  }
                  console.log(`Successfully added issue to project. New Item ID: ${itemId}`);
                }

                // 4. Update the Status field value
                const updateMutation = `
                  mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
                    updateProjectV2ItemFieldValue(
                      input: {
                        projectId: $projectId
                        itemId: $itemId
                        fieldId: $fieldId
                        value: {
                          singleSelectOptionId: $optionId
                        }
                      }
                    ) {
                      projectV2Item {
                        id
                      }
                    }
                  }
                `;
                await github.graphql(updateMutation, {
                  projectId: project.id,
                  itemId,
                  fieldId: statusField.id,
                  optionId: targetOption.id
                });
                console.log(`Successfully updated project Status to "${targetOption.name}".`);
                return true;

              } catch (error) {
                console.error(`Error in updateProjectStatus: ${error.message}`);
                return false;
              }
            }

            // 1. Handle "blocked" label
            if (label === 'blocked') {
              const success = await updateProjectStatus('Blocked');
              if (success) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  body: `🚦 Updated Project Status to **Blocked**.`
                });
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  body: `⚠️ Attempted to update Project Status to **Blocked**, but no matching option or project was found.`
                });
              }
            }

            // 2. Handle team roles assignment based on docs/TEAM_ROLES.md (case-insensitive exact names)
            let teamName = null;
            let teamSlug = null;
            let projectStatusName = null;

            if (label === 'adminarchs') {
              teamName = 'AdminArchs (Senior Maintainers & Core Architecture)';
              teamSlug = 'adminarchs';
              projectStatusName = 'AdminArchs';
            } else if (label === 'devops') {
              teamName = 'AdminArchs (Senior Maintainers & Core Architecture)';
              teamSlug = 'adminarchs';
              projectStatusName = 'DevOps';
            } else if (label === 'pythondevs') {
              teamName = 'PythonDevs (Core Engine Developers)';
              teamSlug = 'pythondevs';
              projectStatusName = 'PythonDevs';
            } else if (label === 'aidevs') {
              teamName = 'AIDevs (AI & Machine Learning Integration)';
              teamSlug = 'aidevs';
              projectStatusName = 'AIDevs';
            } else if (label === 'webdevs') {
              teamName = 'WebDevs (Frontend & UI/UX)';
              teamSlug = 'webdevs';
              projectStatusName = 'WebDevs';
            } else if (label === 'extensiondevs') {
              teamName = 'ExtensionDevs (IDE & Browser Integrations)';
              teamSlug = 'extensiondevs';
              projectStatusName = 'ExtensionDevs';
            } else if (label === 'docsexperts') {
              teamName = 'DocsExperts (Technical Writing & DevRel)';
              teamSlug = 'docsexperts';
              projectStatusName = 'DocsExperts';
            } else if (label === 'testers') {
              teamName = 'Testers (QA & Benchmarking)';
              teamSlug = 'testers';
              projectStatusName = 'Testers';
            }

            if (teamSlug) {
              console.log(`Routing to team: "${teamName}" (Slug: ${teamSlug})`);
              
              // Update Project Status field if applicable
              if (projectStatusName) {
                const projectSuccess = await updateProjectStatus(projectStatusName);
                if (projectSuccess) {
                  console.log(`Successfully transitioned project status to "${projectStatusName}"`);
                }
              }

              // Tag the team via comment
              const commentBody = `Assigning to the **${teamName}** team.\nCC: @${context.repo.owner}/${teamSlug}`;
              try {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  body: commentBody
                });
                console.log('Successfully posted routing comment.');
              } catch (error) {
                console.error(`Failed to post comment: ${error.message}`);
              }

              // Request review if it's a Pull Request (via issue event payload, if applicable)
              if (isPullRequest) {
                try {
                  await github.rest.pulls.requestReviewers({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    pull_number: context.issue.number,
                    team_reviewers: [teamSlug]
                  });
                  console.log(`Requested review from team: ${teamSlug}`);
                } catch (error) {
                  console.warn(`Could not request team review (non-fatal): ${error.message}`);
                }
              }

              // Attempt to assign the team's members to the issue
              try {
                const membersResponse = await github.rest.teams.listMembersInOrg({
                  org: context.repo.owner,
                  team_slug: teamSlug
                });
                const members = membersResponse.data.map(m => m.login);
                if (members.length > 0) {
                  await github.rest.issues.addAssignees({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: context.issue.number,
                    assignees: members
                  });
                  console.log(`Assigned team members: ${members.join(', ')}`);
                } else {
                  console.log('No members found in this team to assign.');
                }
              } catch (error) {
                console.warn(`Could not automatically assign team members (non-fatal): ${error.message}`);
                if (error.status === 404) {
                  console.log(`Team "${teamSlug}" not found in org "${context.repo.owner}". Listing all teams in the organization for troubleshooting...`);
                  try {
                    const teams = await github.rest.teams.list({
                      org: context.repo.owner
                    });
                    const slugs = teams.data.map(t => t.slug);
                    console.log(`Available teams: ${slugs.join(', ') || '(none)'}`);
                  } catch (listError) {
                    console.warn(`Could not list teams in org: ${listError.message}`);
                  }
                }
              }
            }
